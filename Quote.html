<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random Quote Generator</title>
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
body {
  min-height: 100vh;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(
        to right,rgb(86, 86, 199),rgb(48, 120, 169)
    );
  font-family: 'Inter', Arial, sans-serif;
}

.quote-box {
  background: rgba(255, 255, 255, 0.7);
  box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 40px 32px 32px 32px;
  width: 350px;
  text-align: center;
  transition: box-shadow 0.2s;
}

.quote-box:hover {
  box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.22);
}

h1 {
  color: #333;
  font-size: 2rem;
  margin-bottom: 16px;
  font-weight: 700;
}

#author {
  color: #555;
  font-style: italic;
  font-size: 1.1rem;
  margin-bottom: 12px;
  min-height: 24px;
}

#quote {
  color: #222;
  font-size: 1.3rem;
  font-weight: 500;
  margin: 0 0 24px 0;
  min-height: 48px;
  transition: color 0.2s;
}

button {
  padding: 12px 32px;
 background: linear-gradient(
        to right,rgb(86, 86, 199),rgb(48, 120, 169)
    );
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(80, 143, 255, 0.12);
  transition: background 0.2s, box-shadow 0.2s;
}
button:hover {
  background: linear-gradient(
        to right,rgb(107, 107, 198),rgb(63, 128, 172));
  box-shadow: 0 4px 16px rgba(80, 143, 255, 0.18);
}
#quote{
    /* background:linear-gradient(90deg, #cbdbf9 50%, #e8fff7 100%); */
    background-color: #fff;
    border: 0px solid;
    padding: 10px;
    border-radius: 10px;
    font-style: italic;
}
  </style>
</head>
<body>
  <div class="quote-box">
    <h1>Quote Generator</h1>
    <div id="author"></div>
    <div id="quote">Click below to see a quote</div>
    <button onclick="newQuote()">New Quote</button>
  </div>
  <script>
    const quotes = [
      { text: "Believe in yourself." },
      { text: "You are capable of amazing things." },
      { text: "Every moment is a fresh beginning." },
      { text: "Don't watch the clock; do what it does. Keep going."},
      { text: "Stay positive, work hard, make it happen."},
      { text: "Keep on Going, You got this." }
    ];

    function newQuote() {
      const randomIndex = Math.floor(Math.random() * quotes.length);
      document.getElementById("quote").innerText = quotes[randomIndex].text;
      
    }
  </script>
</body>
</html>
